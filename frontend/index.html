<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>RAG Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Asistente Virtual RAG</h1>
  <div id="upload-section">
    <h2>Subir PDF</h2>
    <input type="file" id="file-input" accept=".pdf">
    <button id="upload-btn">Subir</button>
  </div>
  <div id="chat-section">
    <h2>Chat</h2>
    <div id="chat-messages"></div>
    <input type="text" id="question-input" placeholder="Haz una pregunta...">
    <button id="ask-btn">Preguntar</button>
  </div>
  <script src="/api-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
